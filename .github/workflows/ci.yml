name: CI — Test & Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    env:
      # LLM — disable to force rule-based fallback
      DEEPSEEK_API_KEY: ""
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: "https://api.deepseek.com/v1"
      OPENAI_MODEL: "gpt-4-turbo"
      # App
      APP_ENV: "development"
      LOG_LEVEL: "INFO"
      DEFAULT_TIMEZONE: "Asia/Shanghai"
      # Email — disable
      EMAIL_SENDER: ""
      EMAIL_PASSWORD: ""
      EMAIL_SMTP_SERVER: ""
      EMAIL_NOTIFICATION_ENABLED: "true"
      # Force UTF-8 encoding (especially on Windows)
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean stale DB files
        run: python -c "import os; [os.remove(f) for f in ['calendar.db','test_calendar.db'] if os.path.exists(f)]; print('DB cleanup done')"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --no-header

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=long --no-header

      - name: Generate coverage report
        run: |
          python -m pytest tests/unit/ tests/integration/ \
            --cov=. --cov-report=term-missing --ignore=venv -q -p no:cacheprovider

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install types-pytz

      - name: Run flake8 (critical errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.git,__pycache__ || true

      - name: Run mypy (type check)
        run: mypy . --ignore-missing-imports --exclude venv || true
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security lint)
        run: bandit -r . -x ./venv,./.git,./tests -ll || true
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: safety check --full-report || true
        continue-on-error: true
